<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Design: The Gradient Puzzle</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 10px; }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }
        .controls {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
        }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
        }
        button.secondary { background-color: #555; }
        button.danger { background-color: #f44336; }
        .log-box {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .viz-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .canvas-card {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        canvas {
            border: 2px solid #444;
            image-rendering: pixelated;
            background: #000;
            margin-top: 10px;
        }
        label { display: block; margin: 10px 0 5px; color: #aaa; }
        input[type="range"] { width: 100%; }
        select { width: 100%; padding: 8px; background: #444; color: white; border: none; }
    </style>
</head>
<body>
    <h1>Neural Network Design: The Gradient Puzzle</h1>
    
    <div class="container">
        <div class="controls">
            <button id="btnTrainStep">Train 1 Step</button>
            <button id="btnAutoTrain" class="secondary">Auto Train (Start)</button>
            <button id="btnReset" class="danger">Reset Weights</button>
            
            <label>Architecture:</label>
            <select id="selectArch">
                <option value="compression">Compression</option>
                <option value="transformation">Transformation</option>
                <option value="expansion">Expansion</option>
            </select>
            
            <label>Smoothness (λ₁): <span id="valSmooth">0.0</span></label>
            <input type="range" id="rangeSmooth" min="0" max="10" step="0.1" value="0">
            
            <label>Direction (λ₂): <span id="valDir">0.0</span></label>
            <input type="range" id="rangeDir" min="0" max="10" step="0.1" value="0">
            
            <div class="log-box" id="logBox">> Ready...</div>
        </div>
        
        <div class="viz-area">
            <div class="canvas-card">
                <div>Input</div>
                <canvas id="canvasInput" width="160" height="160"></canvas>
            </div>
            <div class="canvas-card">
                <div>Baseline (MSE)</div>
                <canvas id="canvasBaseline" width="160" height="160"></canvas>
            </div>
            <div class="canvas-card">
                <div>Student (Custom)</div>
                <canvas id="canvasStudent" width="160" height="160"></canvas>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
