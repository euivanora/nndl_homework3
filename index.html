<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neural Network Design: The Gradient Puzzle</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<style>
:root {
  --bg: #141414;
  --panel: #222;
  --accent: #4caf50;
  --blue: #2196f3;
  --danger: #f44336;
  --text: #e0e0e0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Segoe UI, sans-serif;
  margin: 0;
  padding: 20px;
  text-align: center;
}

h1 { font-weight: 300; margin-bottom: 5px; }
.subtitle { color: #888; margin-bottom: 20px; }

.container {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.controls {
  width: 320px;
  background: var(--panel);
  padding: 20px;
  border-radius: 8px;
}

button {
  width: 100%;
  margin-bottom: 8px;
  padding: 8px;
  border: none;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: var(--accent); color: white; }
.secondary { background: #555; color: white; }
.danger { background: var(--danger); color: white; }

select, input[type=range] {
  width: 100%;
  margin-bottom: 10px;
}

.log {
  background: black;
  color: #0f0;
  font-family: monospace;
  font-size: 0.8rem;
  height: 140px;
  overflow-y: auto;
  padding: 8px;
  border-radius: 4px;
  text-align: left;
}

.canvas-area {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: var(--panel);
  padding: 15px;
  border-radius: 8px;
}

canvas {
  border: 2px solid #444;
  image-rendering: pixelated;
  background: black;
}
</style>
</head>

<body>

<h1>Neural Network Design: The Gradient Puzzle</h1>
<div class="subtitle">
Mission: Rearrange Noise into a Gradient (Sliding Puzzle, No New Colors)
</div>

<div class="container">

<div class="controls">

<button id="btnTrain" class="primary">Train 1 Step</button>
<button id="btnAuto" class="secondary">Auto Train (Start)</button>
<button id="btnReset" class="danger">Reset Weights</button>

<label>Projection Type (Student Model)</label>
<select id="archSelect">
<option value="compression">Compression</option>
<option value="transformation" selected>Transformation (Mission Mode)</option>
<option value="expansion">Expansion</option>
</select>

<label>Smoothness λ₁: <span id="valSmooth">0</span></label>
<input type="range" id="smoothRange" min="0" max="2" step="0.05" value="0">

<label>Direction λ₂: <span id="valDir">0</span></label>
<input type="range" id="dirRange" min="0" max="2" step="0.05" value="0">

<div class="log" id="log"></div>

</div>

<div class="canvas-area">

<div class="card">
<div>Input (Fixed Noise)</div>
<canvas id="inputCanvas" width="160" height="160"></canvas>
</div>

<div class="card">
<div>Baseline (MSE Only)</div>
<canvas id="baseCanvas" width="160" height="160"></canvas>
</div>

<div class="card">
<div>Student (Custom Intent)</div>
<canvas id="studentCanvas" width="160" height="160"></canvas>
</div>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
