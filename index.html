<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Gradient Puzzle</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>

<style>
body{
  background:#111;
  color:#eee;
  font-family:Segoe UI, sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
}

h1{font-weight:300;margin-bottom:5px}
.subtitle{color:#888;margin-bottom:20px}

.container{
  display:flex;
  gap:30px;
  justify-content:center;
  flex-wrap:wrap;
}

.controls{
  width:320px;
  background:#222;
  padding:20px;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:4px;
  font-weight:bold;
  cursor:pointer;
}

.primary{background:#4caf50;color:white}
.secondary{background:#555;color:white}
.danger{background:#f44336;color:white}

select,input[type=range]{width:100%;margin-bottom:10px}

.log{
  background:black;
  color:#0f0;
  font-family:monospace;
  font-size:12px;
  height:160px;
  overflow-y:auto;
  padding:10px;
  text-align:left;
  border-radius:4px;
}

.canvas-area{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#222;
  padding:15px;
  border-radius:8px;
}

canvas{
  border:2px solid #444;
  image-rendering:pixelated;
  background:black;
  width:320px;
  height:320px;
}
</style>
</head>

<body>

<h1>Neural Network Design: The Gradient Puzzle</h1>
<div class="subtitle">
Mission: Rearrange Noise into a Structured Gradient (No New Colors)
</div>

<div class="container">

<div class="controls">

<button id="btnTrain" class="primary">Train 1 Step</button>
<button id="btnAuto" class="secondary">Auto Train (Start)</button>
<button id="btnReset" class="danger">Reset Weights</button>

<label>Projection Type</label>
<select id="archSelect">
<option value="compression">Compression</option>
<option value="transformation" selected>Transformation (Mission)</option>
<option value="expansion">Expansion</option>
</select>

<label>Smoothness λ₁: <span id="valSmooth">0.3</span></label>
<input type="range" id="smoothRange" min="0" max="2" step="0.05" value="0.3">

<label>Direction λ₂: <span id="valDir">0.8</span></label>
<input type="range" id="dirRange" min="0" max="2" step="0.05" value="0.8">

<div class="log" id="log"></div>

</div>

<div class="canvas-area">

<div class="card">
<div>Input</div>
<canvas id="inputCanvas" width="320" height="320"></canvas>
</div>

<div class="card">
<div>Baseline (MSE)</div>
<canvas id="baseCanvas" width="320" height="320"></canvas>
</div>

<div class="card">
<div>Student (Custom Loss)</div>
<canvas id="studentCanvas" width="320" height="320"></canvas>
</div>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
